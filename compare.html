<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Tools - AI Tools Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .compare-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      padding-top: calc(var(--header-h) + 2rem);
    }
    
    .compare-header {
      text-align: center;
      margin-bottom: 3rem;
    }
    
    .compare-title {
      font-family: var(--font-head);
      font-size: 2.5rem;
      font-weight: 800;
    }
    
    .compare-grid {
      display: grid;
      grid-auto-columns: minmax(0, 1fr);
      grid-auto-flow: column;
      gap: 1.5rem;
      overflow-x: auto;
      padding-bottom: 2rem;
    }
    
    .compare-col {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      position: relative;
      min-width: 300px;
    }
    
    .compare-col-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    
    .compare-icon {
      font-size: 3rem;
      color: var(--accent);
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 10px rgba(0, 212, 255, 0.3));
    }
    
    .compare-name {
      font-family: var(--font-head);
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    
    .compare-desc {
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    
    .compare-row {
      margin-bottom: 1.5rem;
    }
    
    .compare-label {
      font-size: 0.8rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
      font-weight: 700;
    }
    
    .compare-value {
      font-size: 1rem;
      color: var(--text);
    }
    
    .compare-empty {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
    }
    
    .remove-compare-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .remove-compare-btn:hover {
      background: #ef4444;
      color: #fff;
    }
  </style>
</head>

<body>

  <header class="header">
    <div class="left-section">
      <a href="javascript:history.back()" style="text-decoration:none;">
        <button
          style="background:var(--surface);border:1px solid var(--border);color:var(--text);width:38px;height:38px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all 0.2s;">
          <i class="fas fa-arrow-left"></i>
        </button>
      </a>
    </div>
    <div class="logo"><span class="logo-ai">AI</span> Tools Hub</div>
    <div class="right-section">
      <button id="theme-toggle" aria-label="Toggle theme"><i class="fas fa-circle-half-stroke"></i></button>
    </div>
  </header>

  <main class="compare-container">
    <div class="compare-header">
      <h1 class="compare-title">Compare <span class="gradient-text">Side-by-Side</span></h1>
      <p style="color: var(--text-dim); margin-top: 0.5rem;" id="compare-subtitle">Analyze features, pricing, and ratings.</p>
    </div>
    
    <div id="compare-grid" class="compare-grid">
      <!-- Cards injected here via JS -->
    </div>
  </main>

  <!-- script dependencies -->
  <!-- We need the data arrays. Since we don't have a single source of truth file without logic, we'll embed the reading logic -->
  <script src="compare.js"></script>
</body>

</html>
